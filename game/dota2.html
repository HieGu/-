        <div class="wheel-selector">

        window.initWheel = function(wheelsArray, gameKey) {
            if (gameKey === 'dota2') {

                                const selected = getWeightedItem(items);
                                
                                // Обновляем результат
                                resultSpan.textContent = selected;
                                
                                // Обновляем историю и счетчик
                                let spinCount = parseInt(localStorage.getItem(`wheel_${gameKey}_count`) || '0');
                                spinCount++;
                                localStorage.setItem(`wheel_${gameKey}_count`, spinCount);
                                
                                let history = JSON.parse(localStorage.getItem(`wheel_${gameKey}_history`) || '[]');

                                localStorage.setItem(`wheel_${gameKey}_history`, JSON.stringify(history));
                                
                                // Обновляем UI
                                document.getElementById('count').textContent = spinCount;
                                const historyList = document.getElementById('historyList');
                                if (historyList) {
                                    historyList.innerHTML = '';
                                    history.slice(0, 20).forEach(item => {
                                        const li = document.createElement('li');
                                        li.textContent = `${item.item} (${item.wheelName})`;
                                        historyList.appendChild(li);
                                    });
                                }
                                
                                // Визуальный эффект
                                resultSpan.style.transform = 'scale(1.1)';
                                setTimeout(() => {
                                    resultSpan.style.transform = 'scale(1)';
                                }, 200);
                            } else {
                                // Для остальных колес используем стандартную логику
                                if (originalClickHandler) {
                                    originalClickHandler();
                                }
                            }
                        };

                }, 100);
            } else {
                originalInitWheel(wheelsArray, gameKey);
