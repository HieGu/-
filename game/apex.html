<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Challenge Wheel</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <a href="../index.html" class="back-btn">← Назад к играм</a>
        <h1>🔫 APEX LEGENDS - Колесо выбора</h1>
        
        <div class="wheel-selector">
            <label>Выбери колесо:</label>
            <select id="wheelSelect">
                <option value="0">Персонажи (все)</option>
                <option value="1">Класс персонажа</option>
                <option value="2">Штурм</option>
                <option value="3">Столкновение</option>
                <option value="4">Разведка</option>
                <option value="5">Поддержка</option>
                <option value="6">Контроль</option>
                <option value="7">Всё оружие</option>
                <option value="8">Категории оружия</option>
                <option value="9">Категории патронов</option>
                <option value="10">Штурмовые винтовки</option>
                <option value="11">Пистолеты-пулемёты</option>
                <option value="12">Ручные пулемёты</option>
                <option value="13">Марксмана</option>
                <option value="14">Снайперские винтовки</option>
                <option value="15">Дробовики</option>
                <option value="16">Пистолеты</option>
            </select>
            <button id="spinBtn">🎲 ВРАЩАТЬ</button>
        </div>

        <div class="wheel-container">
            <div class="canvas-wrapper">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
        </div>

        <div class="result-area">
            <div class="current-result">👉 <span id="result">—</span> 👈</div>
            <div class="stats">Всего вращений: <span id="count">0</span></div>
        </div>

        <div class="history">
            <h3>📜 История выпадений</h3>
            <ul id="historyList"></ul>
            <button id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>
