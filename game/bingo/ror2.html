<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk of Rain 2 - Bingo</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="../../icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../icon/favicon-16x16.png">
    <link rel="manifest" href="../../icon/site.webmanifest">
    
    <link rel="stylesheet" href="../../css/bingo/stylebingoror2.css">
</head>
<body>
    <div class="bingo-container">
        <a href="../../index.html" class="back-btn">← Назад к играм</a>
        
        <!-- Seed panel -->
        <div class="seed-container">
            <div id="mainMenu">
                <div class="seed-controls">
                    <button class="btn" id="createSeedBtn">Создать сид</button>
                    <div class="seed-input">
                        <input type="text" id="seedInput" placeholder="Введите сид" maxlength="6" style="text-transform:uppercase">
                        <button class="btn btn-secondary" id="loadSeedBtn">Загрузить сид</button>
                    </div>
                </div>
            </div>
            
            <div id="seedPanel" class="hidden">
                <div style="text-align: center;">
                    <div class="seed-code" id="seedCode"></div>
                    <div class="button-group">
                        <button class="btn btn-small" id="copySeedBtn">Копировать сид</button>
                        <button class="btn btn-small btn-secondary" id="clearSeedBtn">Очистить сид</button>
                    </div>
                    <div class="seed-info" id="seedInfo"></div>
                </div>
            </div>
        </div>
        
        <div class="header">
            <h1>RISK OF RAIN 2 BINGO</h1>
            <p>Создайте сид и поделитесь с другом - поле синхронизируется</p>
        </div>

        <div class="controls">
            <button class="btn" id="newGameBtn">Новая игра</button>
            <button class="btn btn-secondary" id="resetProgressBtn">Сбросить прогресс</button>
        </div>

        <div class="bingo-grid" id="bingoGrid"></div>

        <div class="stats">
            <h3>Бинго линии</h3>
            <div class="bingo-lines" id="bingoLines"></div>
        </div>
    </div>

    <!-- Footer с рекламой -->
    <footer class="bingo-footer">
        <div class="footer-content">
            <div class="footer-text">
                <p>Подписывайтесь на этих ребят</p>
            </div>
            <div class="footer-links">
                <div class="footer-link">
                    <a href="https://www.twitch.tv/vladen69" target="_blank" rel="noopener noreferrer">
                        <span class="link-name">VLADEN69</span>
                        <span class="link-platform">Twitch</span>
                    </a>
                    <a href="https://www.youtube.com/@v14d3n" target="_blank" rel="noopener noreferrer">
                        <span class="link-name">VLADEN69</span>
                        <span class="link-platform">YouTube</span>
                    </a>
                </div>
                <div class="footer-link">
                    <a href="https://www.twitch.tv/tijoe" target="_blank" rel="noopener noreferrer">
                        <span class="link-name">Tijoe</span>
                        <span class="link-platform">Twitch</span>
                    </a>
                    <a href="https://www.youtube.com/@TijoeVideos" target="_blank" rel="noopener noreferrer">
                        <span class="link-name">Tijoe</span>
                        <span class="link-platform">YouTube</span>
                    </a>
                </div>
            </div>
            <div class="footer-copyright">
                <p>© 2025 Challenge Wheels | Все права защищены</p>
            </div>
        </div>
    </footer>

    <script src="../../js/bingo/bingoror2.js"></script>
</body>
</html>
