<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slay The Spire 2 - Challenge Wheel</title>
    
    <!-- Иконки -->
    <link rel="apple-touch-icon" sizes="180x180" href="../icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../icon/favicon-32x32.png">
    link rel="icon" type="image/png" sizes="16x16" href="../icon/favicon-16x16.png">
    <link rel="manifest" href="../icon/site.webmanifest">
    
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="game-container">
        <a href="../index.html" class="back-btn">← Назад к играм</a>
        <h1>SLAY THE SPIRE 2 - Колесо выбора</h1>
        
        <div class="wheel-selector">
            <label>Выбери колесо:</label>
            <select id="wheelSelect">
                <option value="0">Железный Клинок (Латаносец)</option>
                <option value="1">Безмолвная</option>
                <option value="2">Наследник</option>
                <option value="3">Призывающая</option>
                <option value="4">Дефект</option>
            </select>
            <button id="spinBtn">ВРАЩАТЬ</button>
        </div>

        <div class="wheel-container">
            <div class="canvas-wrapper">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
        </div>

        <div class="result-area">
            <div class="current-result">👉 <span id="result">—</span> 👈</div>
            <div class="stats">Всего вращений: <span id="count">0</span></div>
        </div>

        <div class="history">
            <h3>История выпадений</h3>
            <ul id="historyList"></ul>
            <button id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <script src="../js/wheel.js"></script>
    <script>
        const wheelsDataSTS2 = [
            ["Защита", "Уязвимость", "Удар", "Стопка пепла", "Трата Оз", "Сила"],
            ["Слабость", "Коварная", "Яд", "Добор + 0 карты", "Заточки"],
            ["Синие звезды", "Закалка", "Добор", "Бесцветные карты", "Дебаффы", "Бодрость", "Слуги"],
            ["Кость", "Злой Рок", "Душа", "Эфирная", "Дебаффы", "Урон"],
            ["Сфера Молний", "0 карты", "Дебаффы", "Статусы", "Сферы + Фокус", "Сфера Льда", "Сфера Тьмы", "Сфера стекла", "Таланты", "Добор", "Сфера Плазмы", "Урон Без сфер"]
        ];

        initWheel(wheelsDataSTS2, 'sts2');
    </script>
</body>
</html>
