<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk of Rain 2 - Challenge Wheel</title>
    
    <!-- Иконки -->
    <link rel="apple-touch-icon" sizes="180x180" href="../../icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../icon/favicon-16x16.png">
    <link rel="manifest" href="../../icon/site.webmanifest">
    
    <link rel="stylesheet" href="../../css/style.css">
    <style>
        .main-layout {
            display: flex;
            justify-content: center;
            gap: 2rem;
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .main-content {
            flex: 1;
            max-width: 900px;
        }

        .right-sidebar {
            width: 260px;
            flex-shrink: 0;
        }
        .ads-header {
    text-align: center;
    margin-bottom: 1.2rem;
    padding: 0.8rem;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 1rem;
    border: 1px solid #ff8c42;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.ads-header p {
    color: #ff8c42;
    font-size: 0.95rem;
    margin: 0;
    line-height: 1.4;
    letter-spacing: 0.5px;
    text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
}

.ads-header p:first-child {
    font-weight: bold;
    color: #ffaa55;
    font-size: 1rem;
    margin-bottom: 0.2rem;
}

.ads-header p:last-child {
    color: #ffaa66;
    font-size: 0.9rem;
}
        .ads-container {
            position: sticky;
            top: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .ad-fixed {
            background: linear-gradient(135deg, #2d2d44 0%, #1a1a2e 100%);
            border: 1px solid #ff6b6b;
            border-radius: 1rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .ad-fixed:hover {
            transform: translateY(-4px);
            border-color: #ff9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .ad-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 1.2rem;
        }

        .ad-content {
            text-align: center;
        }

        .ad-text h4 {
            color: #ff6b6b;
            margin-bottom: 0.3rem;
            font-size: 1.1rem;
        }

        .ad-text p {
            color: #aaa;
            font-size: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .ad-button {
            display: inline-block;
            background: #ff6b6b;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: bold;
            transition: background 0.2s;
        }

        .ad-link:hover .ad-button {
            background: #ff5252;
        }

        .game-container {
            max-width: 100%;
            padding: 0;
        }

        @media (max-width: 1000px) {
            .main-layout {
                flex-direction: column;
                align-items: center;
            }
            
            .right-sidebar {
                width: 100%;
                max-width: 500px;
            }
            
            .ads-container {
                position: static;
                flex-direction: row;
            }
            
            .ad-fixed {
                flex: 1;
            }
        }

        @media (max-width: 700px) {
            .main-layout {
                padding: 1rem;
            }
            
            .ads-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="main-layout">
        <!-- Основной контент -->
        <main class="main-content">
            <div class="game-container">
                <a href="../../index.html" class="back-btn">← Назад к играм</a>
                
                <h1>RISK OF RAIN 2 - Колесо персонажей</h1>
                
                <div class="wheel-selector">
                    <label>Выбери колесо:</label>
                    <select id="wheelSelect">
                        <option value="0">Все персонажи</option>
                    </select>
                    <button id="spinBtn">ВРАЩАТЬ</button>
                </div>

                <div class="wheel-container">
                    <div class="canvas-wrapper">
                        <canvas id="wheelCanvas" width="500" height="500"></canvas>
                        <div class="pointer"></div>
                    </div>
                </div>

                <div class="result-area">
                    <div class="current-result">👉 <span id="result">—</span> 👈</div>
                    <div class="stats">Всего вращений: <span id="count">0</span></div>
                </div>

                <div class="history">
                    <h3>История выпадений</h3>
                    <ul id="historyList"></ul>
                    <button id="clearHistoryBtn">Очистить историю</button>
                </div>
            </div>
        </main>

        <!-- Правая фиксированная панель с рекламой -->
        <aside class="right-sidebar">
            <div class="ads-header">
                <p>Сайт работает при помощи этих людей</p>
                <p>подписывайтесь на них</p>
            </div>
            <div class="ads-container">
                <div class="ad-fixed">
                    <a href="https://www.twitch.tv/vladen69" target="_blank" class="ad-link">
                        <div class="ad-content">
                            <div class="ad-text">
                                <h4>VLADEN69</h4>
                                <p>Twitch стримы</p>
                                <span class="ad-button">Смотреть →</span>
                            </div>
                        </div>
                    </a>
                </div>
                <div class="ad-fixed">
                    <a href="https://www.youtube.com/@v14d3n" target="_blank" class="ad-link">
                        <div class="ad-content">
                            <div class="ad-text">
                                <h4>V14D3N</h4>
                                <p>YouTube канал</p>
                                <span class="ad-button">Смотреть →</span>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </aside>
    </div>

    <script src="../../js/wheel.js"></script>
    <script>
        const wheelsDataROR2 = [
            [
                "Commando", "Huntress", "Bandit", "MUL-T", "Engineer",
                "Artificer", "Mercenary", "REX", "Loader", "Acrid",
                "Captain", "Railgunner", "Void Fiend", "Seeker",
                "False Son", "CHEF", "Operator", "Drifter"
            ]
        ];

        initWheel(wheelsDataROR2, 'ror2');
    </script>
</body>
</html>
