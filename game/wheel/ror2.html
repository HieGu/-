<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk of Rain 2 - Challenge Wheel</title>
    
    <link rel="apple-touch-icon" sizes="180x180" href="../../icon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="../../icon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../icon/favicon-16x16.png">
    <link rel="manifest" href="../../icon/site.webmanifest">
    
    <link rel="stylesheet" href="../../css/style.css">
</head>
<body>
    <div class="game-container">
        <a href="../../index.html" class="back-btn">← Назад к играм</a>
        <h1>RISK OF RAIN 2 - Колесо персонажей</h1>
        
        <div class="wheel-selector">
            <label>Выбери колесо:</label>
            <select id="wheelSelect">
                <option value="0">Все персонажи</option>
            </select>
            <button id="spinBtn">ВРАЩАТЬ</button>
        </div>

        <div class="wheel-container">
            <div class="canvas-wrapper">
                <canvas id="wheelCanvas" width="500" height="500"></canvas>
                <div class="pointer"></div>
            </div>
        </div>

        <div class="result-area">
            <div class="current-result">👉 <span id="result">—</span> 👈</div>
            <div class="stats">Всего вращений: <span id="count">0</span></div>
        </div>

        <div class="history">
            <h3>История выпадений</h3>
            <ul id="historyList"></ul>
            <button id="clearHistoryBtn">Очистить историю</button>
        </div>
    </div>

    <!-- Реклама внизу -->
    <div class="bottom-ads">
        <div class="ads-header">
            <p>Сайт работает при помощи этих людей</p>
            <p>подписывайтесь на них</p>
        </div>
        <div class="ads-container">
            <div class="ad-fixed">
                <a href="https://www.twitch.tv/vladen69" target="_blank" class="ad-link">
                    <div class="ad-content">
                        <div class="ad-text">
                            <h4>VLADEN69</h4>
                            <p>Twitch стримы</p>
                            <span class="ad-button">Смотреть →</span>
                        </div>
                    </div>
                </a>
            </div>
            <div class="ad-fixed">
                <a href="https://www.youtube.com/@v14d3n" target="_blank" class="ad-link">
                    <div class="ad-content">
                        <div class="ad-text">
                            <h4>V14D3N</h4>
                            <p>YouTube канал</p>
                            <span class="ad-button">Смотреть →</span>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <style>
        .bottom-ads {
            max-width: 800px;
            margin: 2rem auto 0 auto;
            padding: 1rem;
            border-top: 1px solid #f0e0c0;
        }
        
        .ads-header {
            text-align: center;
            margin-bottom: 1rem;
            padding: 0.5rem;
        }
        
        .ads-header p {
            color: #d98c2b;
            font-size: 0.9rem;
            margin: 0;
        }
        
        .ads-header p:first-child {
            font-weight: bold;
            color: #b56a1a;
            font-size: 0.95rem;
        }
        
        .ads-container {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .ad-fixed {
            background: linear-gradient(135deg, #fff5e6, #fff9ef);
            border: 1px solid #f0e0c0;
            border-radius: 1rem;
            transition: all 0.3s ease;
            width: 220px;
        }
        
        .ad-fixed:hover {
            transform: translateY(-4px);
            border-color: #d98c2b;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        
        .ad-link {
            text-decoration: none;
            color: inherit;
            display: block;
            padding: 1rem;
        }
        
        .ad-content {
            text-align: center;
        }
        
        .ad-text h4 {
            color: #d98c2b;
            margin-bottom: 0.3rem;
            font-size: 1rem;
        }
        
        .ad-text p {
            color: #666;
            font-size: 0.7rem;
            margin-bottom: 0.5rem;
        }
        
        .ad-button {
            display: inline-block;
            background: #d98c2b;
            color: white;
            padding: 0.2rem 0.7rem;
            border-radius: 2rem;
            font-size: 0.65rem;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .ad-link:hover .ad-button {
            background: #b56a1a;
        }
        
        @media (max-width: 700px) {
            .ad-fixed {
                width: 100%;
                max-width: 280px;
            }
        }
    </style>

    <script src="../../js/wheel.js"></script>
    <script>
        const wheelsDataROR2 = [
            [
                "Commando", "Huntress", "Bandit", "MUL-T", "Engineer",
                "Artificer", "Mercenary", "REX", "Loader", "Acrid",
                "Captain", "Railgunner", "Void Fiend", "Seeker",
                "False Son", "CHEF", "Operator", "Drifter"
            ]
        ];

        initWheel(wheelsDataROR2, 'ror2');
    </script>
</body>
</html>
